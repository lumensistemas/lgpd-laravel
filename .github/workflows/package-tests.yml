name: Tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should-test: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - '**.php'
              - '.github/workflows/package-tests.yml'
              - 'phpunit.xml.dist'
              - 'phpstan.neon.dist'
              - 'composer.json'

  lint:
    needs: changes
    if: needs.changes.outputs.should-test == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    name: Lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, sodium, fileinfo
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run linting tests
        run: composer test:lint

      - name: Run static analysis
        run: composer analyze

      - name: Run static analysis
        run: composer test:type-coverage

  tests:
    needs: changes
    if: needs.changes.outputs.should-test == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: [8.4, 8.5]
        stability: [prefer-lowest, prefer-stable]

    name: Tests - P${{ matrix.php }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sodium, fileinfo, pdo_sqlite
          tools: composer:v2
          coverage: pcov

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: composer test:coverage

  ci-status:
    if: always()
    needs: [changes, lint, tests]
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.tests.result }}" == "failure" ]]; then
            echo "Tests failed"
            exit 1
          fi
          echo "CI passed or was skipped (no source changes)"
